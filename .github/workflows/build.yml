name: Build Watch Face APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v7
      with:
        name: pixel-modular-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build and Sign Release APK
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "No keystore secret provided. Generating an automatic keystore for release build..."
          keytool -genkey -v -keystore release.keystore -alias automatic_key -keyalg RSA -keysize 2048 -validity 10000 -storepass "android123" -keypass "android123" -dname "CN=Pixel, OU=Modular, O=Watch, L=San Francisco, S=CA, C=US"
          export KEYSTORE_PATH=$(pwd)/release.keystore
          export KEYSTORE_PASSWORD=android123
          export KEY_ALIAS=automatic_key
          export KEY_PASSWORD=android123
        else
          echo "Decoding user-provided keystore..."
          echo $KEYSTORE_BASE64 | base64 --decode > release.keystore
          export KEYSTORE_PATH=$(pwd)/release.keystore
        fi
        ./gradlew assembleRelease
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v7
      with:
        name: pixel-modular-release
        path: app/build/outputs/apk/release/*.apk

    - name: Publish Release Assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/*.apk
